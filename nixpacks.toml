# EasyPanel / Nixpacks: API HTTP + dependências do Chrome (Remotion headless).
# Use apenas aptPkgs na fase setup — NÃO rode apt-get manual na fase install (o gerador
# injeta `sudo` e quebra o build com exit 100 em alguns ambientes).
# Doc: https://nixpacks.com/docs/configuration/file
#
# Se o render ainda falhar com libs do Chrome, faça build pelo Dockerfile da raiz.

[phases.setup]
aptPkgs = [
  "...",
  "libnspr4",
  "libnss3",
  "libdbus-1-3",
  "libatk1.0-0",
  "libgbm-dev",
  "libasound2t64",
  "libxrandr2",
  "libxkbcommon-dev",
  "libxfixes3",
  "libxcomposite1",
  "libxdamage1",
  "libatk-bridge2.0-0",
  "libpango-1.0-0",
  "libcairo2",
  "libcups2",
]

# Gera public/preview.bundle.js (gitignored; obrigatório para GET /preview).
# O render headless continua usando bundle on-demand em runtime.
[phases.build]
cmds = ["npm run build:preview", "npx remotion browser ensure"]

[start]
cmd = "node scripts/http-server.mjs"
