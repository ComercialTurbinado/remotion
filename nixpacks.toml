# EasyPanel / Nixpacks: API HTTP + dependências do Chrome (Remotion headless).
# "..." preserva pacotes/comandos que o provider Node já define.
# Doc: https://nixpacks.com/docs/configuration/file

[phases.setup]
aptPkgs = [
  "...",
  "libnspr4",
  "libnss3",
  "libdbus-1-3",
  "libatk1.0-0",
  "libgbm-dev",
  "libasound2",
  "libxrandr2",
  "libxkbcommon-dev",
  "libxfixes3",
  "libxcomposite1",
  "libxdamage1",
  "libatk-bridge2.0-0",
  "libpango-1.0-0",
  "libcairo2",
  "libcups2",
]

[phases.build]
cmds = ["...", "npx remotion browser ensure"]

[start]
cmd = "node scripts/http-server.mjs"
